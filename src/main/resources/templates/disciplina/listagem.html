<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Disciplinas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div class="d-flex gap-2">
            <a th:href="@{/usuario}" class="nav-link">Usuários</a>
            <a th:href="@{/evento}" class="nav-link">Eventos</a>
            <a th:href="@{/aluno}" class="nav-link">Alunos</a>
            <a th:href="@{/disciplina}" class="nav-link" style="color: var(--primary); background: rgba(99,102,241,0.08);">Disciplinas</a>
        </div>
    </div>
</nav>

<div class="page-container">

    <div th:if="${message}" class="alert-modern alert-success" th:text="${message}"></div>

    <div class="page-header">
        <h2>Lista de Disciplinas</h2>
        <a th:href="@{/disciplina/formulario}" class="btn-primary-custom">+ Nova Disciplina</a>
    </div>

    <div class="table-wrapper">
        <table class="table-modern">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="d : ${lista}">
                    <td th:text="${d.id}"></td>
                    <td th:text="${d.nome}"></td>
                    <td th:text="${d.descricao}"></td>
                    <td>
                        <div class="table-actions">
                            <a th:href="@{'/disciplina/formulario/' + ${d.id}}" class="btn-edit">Editar</a>
                            <a th:href="@{'/disciplina/delete/' + ${d.id}}" class="btn-danger-custom"
                               onclick="return confirm('Excluir esta disciplina?')">Excluir</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(lista)}">
                    <td colspan="4">
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg>
                            <p>Nenhuma disciplina cadastrada.</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
