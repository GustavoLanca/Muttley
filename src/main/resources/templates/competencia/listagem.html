<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Competências</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div class="d-flex gap-2">
            <a th:href="@{/evento}" class="nav-link">Eventos</a>
            <a th:href="@{/tag}" class="nav-link">Tags</a>
            <a th:href="@{/competencia}" class="nav-link" style="color: var(--primary); background: rgba(99,102,241,0.08);">Competências</a>
        </div>
    </div>
</nav>

<div class="page-container">

    <div th:if="${message}" class="alert-modern alert-success" th:text="${message}"></div>

    <div class="page-header">
        <h2>Lista de Competências</h2>
        <a th:href="@{/competencia/formulario}" class="btn-primary-custom">+ Nova Competência</a>
    </div>

    <div class="table-wrapper">
        <table class="table-modern">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tag</th>
                    <th>Evento</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${lista}">
                    <td th:text="${c.id}"></td>
                    <td>
                        <span class="badge-custom badge-orange" th:text="${c.tag.nome}"></span>
                    </td>
                    <td>
                        <span class="badge-custom badge-green" th:text="${c.evento.titulo}"></span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(lista)}">
                    <td colspan="3">
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/><path d="M6 6h.008v.008H6V6z"/></svg>
                            <p>Nenhuma competência registrada.</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
