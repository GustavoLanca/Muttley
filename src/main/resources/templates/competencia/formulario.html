<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Competência</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div class="d-flex gap-2">
            <a th:href="@{/evento}" class="nav-link">Eventos</a>
            <a th:href="@{/tag}" class="nav-link">Tags</a>
            <a th:href="@{/competencia}" class="nav-link" style="color: var(--primary); background: rgba(99,102,241,0.08);">Competências</a>
        </div>
    </div>
</nav>

<div class="page-container">
    <div class="form-wrapper">

        <div class="form-card">
            <div class="card-header-modern">
                <h4>Nova Competência</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/competencia/salvar}" method="post">
                    <div class="form-group">
                        <label class="form-label-modern">ID da Tag</label>
                        <input type="number" class="form-input" name="tagId" placeholder="Digite o ID da tag" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label-modern">ID do Evento</label>
                        <input type="number" class="form-input" name="eventoId" placeholder="Digite o ID do evento" required>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/competencia}" class="btn-secondary-custom">Voltar</a>
                        <button type="submit" class="btn-primary-custom">Associar</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
