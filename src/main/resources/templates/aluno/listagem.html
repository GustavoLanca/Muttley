<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Alunos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div class="d-flex gap-2">
            <a th:href="@{/usuario}" class="nav-link">Usuários</a>
            <a th:href="@{/aluno}" class="nav-link" style="color: var(--primary); background: rgba(99,102,241,0.08);">Alunos</a>
            <a th:href="@{/disciplina}" class="nav-link">Disciplinas</a>
        </div>
    </div>
</nav>

<div class="page-container">

    <div th:if="${message}" class="alert-modern alert-success" th:text="${message}"></div>

    <div class="page-header">
        <h2>Lista de Alunos</h2>
        <a th:href="@{/aluno/formulario}" class="btn-primary-custom">+ Novo Aluno</a>
    </div>

    <div class="table-wrapper">
        <table class="table-modern">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${lista}">
                    <td th:text="${a.id}"></td>
                    <td th:text="${a.nome}"></td>
                    <td>
                        <span class="badge-custom badge-purple" th:text="${a.email}"></span>
                    </td>
                    <td>
                        <div class="table-actions">
                            <a th:href="@{'/aluno/formulario/' + ${a.id}}" class="btn-edit">Editar</a>
                            <a th:href="@{'/aluno/delete/' + ${a.id}}" class="btn-danger-custom"
                               onclick="return confirm('Excluir este aluno?')">Excluir</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(lista)}">
                    <td colspan="4">
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5"/></svg>
                            <p>Nenhum aluno cadastrado.</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
