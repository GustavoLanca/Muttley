<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fórum</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div class="d-flex gap-2">
            <a th:href="@{/aluno}" class="nav-link">Alunos</a>
            <a th:href="@{/evento}" class="nav-link">Eventos</a>
            <a th:href="@{/disciplina}" class="nav-link">Disciplinas</a>
            <a th:href="@{/forum}" class="nav-link" style="color: var(--primary); background: rgba(99,102,241,0.08);">Fóruns</a>
        </div>
    </div>
</nav>

<div class="page-container">
    <div class="form-wrapper">

        <div class="form-card">
            <div class="card-header-modern">
                <h4>Registrar Fórum</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/forum/salvar}" method="post">
                    <div class="form-group">
                        <label class="form-label-modern">ID do Aluno</label>
                        <input type="number" class="form-input" name="alunoId" placeholder="Digite o ID do aluno" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label-modern">ID do Evento</label>
                        <input type="number" class="form-input" name="eventoId" placeholder="Digite o ID do evento" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label-modern">ID da Disciplina</label>
                        <input type="number" class="form-input" name="disciplinaId" placeholder="Digite o ID da disciplina" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label-modern">Semestre</label>
                        <input type="number" class="form-input" name="semestre" placeholder="Ex: 1" min="1" max="10" required>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/forum}" class="btn-secondary-custom">Voltar</a>
                        <button type="submit" class="btn-primary-custom">Registrar</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
