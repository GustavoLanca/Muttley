<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quadro de Medalhas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container">
        <a href="#" class="btn-back" onclick="history.back(); return false;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
            Voltar
        </a>
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div></div>
    </div>
</nav>

<div class="page-container">

    <div class="page-header">
        <h2>Quadro de Medalhas dos Usuários</h2>
    </div>

    <div class="index-grid">
        <div th:each="u : ${usuarios}" class="menu-card">
            <div class="icon-circle">
                <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
            </div>
            <h4 th:text="${u.nome}"></h4>
            <p>
                <span class="badge-custom badge-purple" th:text="${u.email}"></span>
                <span th:if="${u.aluno != null}" class="badge-custom badge-green">Aluno</span>
                <span th:unless="${u.aluno != null}" class="badge-custom badge-orange">Não aluno</span>
            </p>
            <div style="margin-top: 1rem; text-align: left; width: 100%;">
                <p style="font-weight: 600; color: var(--text-light); margin-bottom: 0.5rem;">Pontuação: 
                    <span class="badge-custom badge-green" th:text="${u.totalPontos()} + ' pts'"></span>
                </p>
                <p style="font-weight: 600; color: var(--text-light); margin-bottom: 0.5rem;">Medalhas:</p>
                <div th:if="${u.medalhas != null and !u.medalhas.empty}" style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                    <span th:each="m : ${u.medalhas}" class="badge-custom badge-orange" th:text="${m.nome}"></span>
                </div>
                <div th:if="${u.medalhas == null or u.medalhas.empty}" style="color: var(--text-light); font-size: 0.9rem;">
                    Nenhuma medalha conquistada
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(usuarios)}" class="empty-state">
            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
            <p>Nenhum usuário cadastrado.</p>
        </div>
    </div>

</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
