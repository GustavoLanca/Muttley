<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Participações</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container">
        <a href="#" class="btn-back" onclick="history.back(); return false;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
            Voltar
        </a>
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div></div>
    </div>
</nav>

<div class="page-container">

    <div th:if="${message}" class="alert-modern alert-success" th:text="${message}"></div>

    <div class="page-header">
        <h2>Lista de Participações</h2>
        <a th:href="@{/participacao/formulario}" class="btn-primary-custom">+ Nova Participação</a>
    </div>

    <div class="table-wrapper">
        <table class="table-modern">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuário</th>
                    <th>Evento</th>
                    <th>Pontos</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${lista}">
                    <td th:text="${p.id}"></td>
                    <td>
                        <span class="badge-custom badge-purple" th:text="${p.usuario.nome}"></span>
                    </td>
                    <td>
                        <span class="badge-custom badge-green" th:text="${p.evento.titulo}"></span>
                    </td>
                    <td>
                        <span class="badge-custom badge-orange" th:text="${p.pontos} + ' pts'"></span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(lista)}">
                    <td colspan="3">
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
                            <p>Nenhuma participação registrada.</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
