<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Participação</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container">
        <a href="#" class="btn-back" onclick="history.back(); return false;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
            Voltar
        </a>
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div></div>
    </div>
</nav>

<div class="page-container">
    <div class="form-wrapper">

        <div class="form-card">
            <div class="card-header-modern">
                <h4>Registrar Participação</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/participacao/salvar}" method="post">
                    <div class="form-group">
                        <label class="form-label-modern">ID do Usuário</label>
                        <input type="number" class="form-input" name="usuarioId" placeholder="Digite o ID do usuário" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label-modern">ID do Evento</label>
                        <input type="number" class="form-input" name="eventoId" placeholder="Digite o ID do evento" required>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/participacao}" class="btn-secondary-custom">Voltar</a>
                        <button type="submit" class="btn-primary-custom">Registrar</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
