<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Participação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Registrar Participação</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/participacao/salvar}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">ID do Usuário</label>
                    <input type="number" class="form-control" name="usuarioId" placeholder="Digite o ID do usuário" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">ID do Evento</label>
                    <input type="number" class="form-control" name="eventoId" placeholder="Digite o ID do evento" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/participacao}" class="btn btn-secondary">Voltar</a>
                    <button type="submit" class="btn btn-primary">Registrar</button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
