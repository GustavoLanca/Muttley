<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0" th:text="${evento.id != null} ? 'Editar Evento' : 'Novo Evento'"></h4>
        </div>
        <div class="card-body">
            <form th:action="@{/evento/salvar}" th:object="${evento}" method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Título</label>
                    <input type="text" class="form-control" th:field="*{titulo}" placeholder="Digite o título" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/evento}" class="btn btn-secondary">Voltar</a>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
