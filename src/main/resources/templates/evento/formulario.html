<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Evento</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container">
        <a href="#" class="btn-back" onclick="history.back(); return false;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
            Voltar
        </a>
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div></div>
    </div>
</nav>

<div class="page-container">
    <div class="form-wrapper">

        <div class="form-card">
            <div class="card-header-modern">
                <h4 th:text="${evento?.id != null} ? 'Editar Evento' : 'Novo Evento'"></h4>
            </div>
<div class="card-body">
    <form th:action="@{/evento/salvar}" th:object="${evento}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <div class="form-group">
            <label class="form-label-modern">Título</label>
            <input type="text" class="form-input" th:field="*{titulo}" placeholder="Digite o título" required>
        </div>

<div class="form-group">
    <label class="form-label-modern">Tipo do Evento</label>
    <select class="form-input" th:field="*{tipoEvento}" required>
        <option value="">Selecione o tipo</option>
        <option th:each="tipo : ${tiposEvento}"
                th:value="${tipo}"
                th:text="${tipo.descricao + ' (' + tipo.pontos + ' pts)'}"></option>
    </select>
</div>

<div class="form-group">
    <label class="form-label-modern">Competências</label>
    <select class="form-input" th:field="*{competencias}" multiple required>
        <option th:each="c : ${competencias}" th:value="${c.id}" th:text="${c.nome}"></option>
    </select>
    <small style="color: var(--text-light); font-size: 0.8rem;">Segure Ctrl para selecionar múltiplas competências</small>
</div>

        <div class="form-actions">
            <a th:href="@{/evento}" class="btn-secondary-custom">Voltar</a>
            <button type="submit" class="btn-primary-custom">Salvar</button>
        </div>
    </form>
</div>
        </div>

    </div>
</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
