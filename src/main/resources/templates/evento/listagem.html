<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Lista de Eventos</h2>
        <a th:href="@{/evento/formulario}" class="btn btn-primary">+ Novo Evento</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="e : ${lista}">
                        <td th:text="${e.id}"></td>
                        <td th:text="${e.titulo}"></td>
                        <td>
                            <a th:href="@{'/evento/formulario/' + ${e.id}}" class="btn btn-sm btn-outline-primary">Editar</a>
                            <a th:href="@{'/evento/delete/' + ${e.id}}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Excluir este evento?')">Excluir</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
