<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Eventos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container">
        <a href="#" class="btn-back" onclick="history.back(); return false;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
            Voltar
        </a>
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div></div>
    </div>
</nav>

<div class="page-container">

    <div th:if="${message}" class="alert-modern alert-success" th:text="${message}"></div>

    <div class="page-header">
        <h2>Lista de Eventos</h2>
        <a th:href="@{/evento/formulario}" class="btn-primary-custom">+ Novo Evento</a>
    </div>

    <div class="table-wrapper">
        <table class="table-modern">
<thead>
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Tipo</th>
        <th>Competência</th>
        <th>Ações</th>
    </tr>
</thead>
<tbody>
    <tr th:each="e : ${lista}">
        <td th:text="${e.id}"></td>
        <td th:text="${e.titulo}"></td>
        <td>
            <span class="badge-custom badge-green" th:text="${e.tipoEvento != null} ? ${e.tipoEvento.descricao + ' (' + e.tipoEvento.pontos + ' pts)'} : 'Não informado'"></span>
        </td>
        <td>
            <span th:each="comp : ${e.competencias}" class="badge-custom badge-purple" th:text="${comp.nome}"></span>
            <span th:if="${#lists.isEmpty(e.competencias)}" style="color: var(--text-light);">Nenhuma</span>
        </td>
        <td>
            <div class="table-actions">
                <a th:href="@{'/evento/formulario/' + ${e.id}}" class="btn-edit">Editar</a>
                <a th:href="@{'/evento/delete/' + ${e.id}}" class="btn-danger-custom"
                   onclick="return confirm('Excluir este evento?')">Excluir</a>
            </div>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(lista)}">
        <td colspan="4">
            <div class="empty-state">
                <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
                <p>Nenhum evento cadastrado.</p>
            </div>
        </td>
    </tr>
</tbody>
        </table>
    </div>

</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
