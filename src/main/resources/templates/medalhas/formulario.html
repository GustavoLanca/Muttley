<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Medalha</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar-custom">
    <div class="container">
        <a href="#" class="btn-back" onclick="history.back(); return false;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
            Voltar
        </a>
        <a th:href="@{/}" class="navbar-brand">Muttley</a>
        <div></div>
    </div>
</nav>

<div class="page-container">
    <div class="form-wrapper">

        <div class="form-card">
            <div class="card-header-modern">
                <h4 th:text="${medalha?.id != null} ? 'Editar Medalha' : 'Nova Medalha'"></h4>
            </div>
            <div class="card-body">
                <form th:action="@{/medalha/salvar}" th:object="${medalha}" method="post">
                    <input type="hidden" th:field="*{id}"/>

                    <div class="form-group">
                        <label class="form-label-modern">Nome</label>
                        <input type="text" class="form-input" th:field="*{nome}" placeholder="Digite o nome da medalha" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label-modern">Pontos Necessários</label>
                        <input type="number" class="form-input" th:field="*{pontosNecessarios}" placeholder="Digite a pontuação necessária" min="1" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label-modern">Usuário</label>
                        <select class="form-input" th:field="*{usuario}">
                            <option value="">Selecione um usuário</option>
                            <option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.nome}"></option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/medalha}" class="btn-secondary-custom">Voltar</a>
                        <button type="submit" class="btn-primary-custom">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

<div class="footer">
    <div class="container">
        &copy; 2026 Muttley
    </div>
</div>

</body>
</html>
