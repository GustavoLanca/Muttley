<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Muttley</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background-color: #0d6efd; padding: 60px 0; margin-bottom: 40px; }
        .card-menu { border: none; }
    </style>
</head>
<body>

<div class="hero text-center">
    <h1 class="display-4 fw-bold text-white">Muttley</h1>
    <p class="lead text-white-50">Sistema de gerenciamento de eventos e participações</p>
</div>

<div class="container">
    <div class="row g-4 justify-content-center">

        <div class="col-md-4">
            <a th:href="@{/usuario}" class="text-decoration-none">
                <div class="card card-menu shadow-sm text-center p-4 h-100">
                    <h4 class="card-title fw-bold text-primary">Usuários</h4>
                    <p class="card-text text-muted">Gerencie os usuários cadastrados no sistema.</p>
                    <span class="btn btn-outline-primary mt-auto">Acessar</span>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a th:href="@{/evento}" class="text-decoration-none">
                <div class="card card-menu shadow-sm text-center p-4 h-100">
                    <h4 class="card-title fw-bold text-primary">Eventos</h4>
                    <p class="card-text text-muted">Crie e gerencie os eventos disponíveis.</p>
                    <span class="btn btn-outline-primary mt-auto">Acessar</span>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a th:href="@{/participacao}" class="text-decoration-none">
                <div class="card card-menu shadow-sm text-center p-4 h-100">
                    <h4 class="card-title fw-bold text-primary">Participações</h4>
                    <p class="card-text text-muted">Registre e visualize participações em eventos.</p>
                    <span class="btn btn-outline-primary mt-auto">Acessar</span>
                </div>
            </a>
        </div>

    </div>
</div>

</body>
</html>
